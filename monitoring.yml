services:

  prometheus:
    image: prom/prometheus:v2.32.1  # Use the latest Prometheus version https://github.com/FIWARE/context.Orion-LD/pull/1896
    hostname: prometheus
    container_name: prometheus
    volumes:
      - prometheus-data:/prometheus # storing the logs NEEDS to be first 
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml  # Mount the configuration file
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=365d'
      - '--storage.tsdb.retention.size=512MB'
    networks:
      - ramp_iiot
    ports:
      - "127.0.0.1:9090:9090"  # Prometheus server port
    depends_on:
      - ramp_iiot-orion  # Ensuring it starts after your service

  alertmanager:
    image: quay.io/prometheus/alertmanager
    hostname: prometheus-alertmanager
    container_name: prometheus-alertmanager
    restart: unless-stopped
    networks:
      - ramp_iiot
    ports:
      - "127.0.0.1:9093:9093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./monitoring/alertmanager.yml:/config/alertmanager.yml"
      - alertmanager-data:/data
    command: --config.file=/config/alertmanager.yml --log.level=debug

  uptime-kuma:
    image: louislam/uptime-kuma:1
    hostname: uptime-kuma
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - ramp_iiot
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT}:3001"
    volumes:
      - uptime-kuma-data:/app/data
    depends_on:
      - ramp_iiot-orion

  loki:
    image: grafana/loki:2.9.4
    hostname: loki
    container_name: loki
    restart: unless-stopped
    user: root
    networks:
      - ramp_iiot
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.4
    hostname: promtail
    container_name: promtail
    restart: unless-stopped
    networks:
      - ramp_iiot
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki


volumes:
  prometheus-data:
  alertmanager-data:
  uptime-kuma-data:
  loki-data: