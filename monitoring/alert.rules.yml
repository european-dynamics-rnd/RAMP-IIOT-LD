groups:
- name: orion_alerts
  rules:
  - alert: LowIncomingTransactions
    expr: rate(ngsildRequests[10m]) < 0.01
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Low incoming transactions in Orion"
      description: "The rate of incoming transactions in Orion for ngsild Requests has been below 0.01 per 10 minute."
